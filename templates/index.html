<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groundline — Gemini Search Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⟡</span>
      <span class="brand-name">Groundline</span>
    </div>
    <div class="badge">
      <span class="badge-dot" id="statusDot"></span>
      <span id="statusText">gemini-2.5-flash · search grounding on</span>
    </div>
  </header>

  <main class="log" id="log">
    <div class="empty-state" id="emptyState">
      <p class="empty-title">Ask something that needs today's answer, not last year's.</p>
      <p class="empty-sub">Every response is checked against live search results. Sources are cited below each answer.</p>
    </div>
  </main>

  <form class="composer" id="composer" autocomplete="off">
    <textarea
      id="input"
      placeholder="Ask Groundline anything…"
      rows="1"
      required
    ></textarea>
    <button type="submit" id="sendBtn" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M4 12L20 4L13 20L11 13L4 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </button>
  </form>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
